<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="797" cy="294" r="51" fill="#f57c00" opacity="0.18"/>
    <circle cx="809" cy="448" r="21" fill="#f57c00" opacity="0.19"/>
    <circle cx="724" cy="600" r="26" fill="#f57c00" opacity="0.16"/>
    <circle cx="1285" cy="319" r="21" fill="#f57c00" opacity="0.19"/>
    <circle cx="1038" cy="690" r="39" fill="#f57c00" opacity="0.07"/>
    <circle cx="-98" cy="442" r="78" fill="#f57c00" opacity="0.12"/>
    <rect x="1092" y="617" width="59" height="50" rx="8" fill="#e65100" opacity="0.12" transform="rotate(31, 89, 489)"/>
    <rect x="395" y="504" width="77" height="60" rx="8" fill="#e65100" opacity="0.13" transform="rotate(12, 97, 196)"/>
    <rect x="825" y="241" width="59" height="36" rx="8" fill="#e65100" opacity="0.14" transform="rotate(33, 214, 554)"/>
    <rect x="266" y="492" width="95" height="67" rx="8" fill="#e65100" opacity="0.11" transform="rotate(3, 827, 263)"/>
    <rect x="270" y="484" width="50" height="77" rx="8" fill="#e65100" opacity="0.13" transform="rotate(41, 900, 434)"/>
    <rect x="78" y="648" width="71" height="67" rx="8" fill="#e65100" opacity="0.08" transform="rotate(21, 374, 427)"/>
    <rect x="360" y="42" width="67" height="63" rx="8" fill="#e65100" opacity="0.12" transform="rotate(24, 216, 219)"/>
    <rect x="778" y="402" width="56" height="42" rx="8" fill="#e65100" opacity="0.05" transform="rotate(36, 58, 343)"/>
    <polygon points="129,-98 197,38 61,38" fill="#f57c00" opacity="0.11"/>
    <polygon points="309,-101 371,23 247,23" fill="#f57c00" opacity="0.12"/>
    <polygon points="255,593 298,679 212,679" fill="#f57c00" opacity="0.12"/>
    <polygon points="-36,411 -3,477 -69,477" fill="#f57c00" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,556 C360,593 840,519 1200,556 L1200,630 L0,630Z" fill="#f57c00" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마포 홍대입구 럭셔리 셔츠룸 리뷰
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffcc80" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffcc80" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 마포 홍대입구 럭셔리 셔츠룸 리뷰 — 셔츠룸
  </text>
</svg>